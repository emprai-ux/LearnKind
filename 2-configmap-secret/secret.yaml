---
# Secret - Store sensitive data
# NOTE: Secrets are base64 encoded by default (NOT encrypted)
# For production, use external secret management (Vault, AWS Secrets Manager, etc.)
# stringData automatically converts to base64

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: learning
  labels:
    app: hello-app
    type: sensitive
type: Opaque  # Generic key-value secret type
stringData:
  # Sensitive credentials
  DATABASE_USERNAME: "appuser"
  DATABASE_PASSWORD: "SecureP@ssw0rd123"
  API_KEY: "sk_live_1a2b3c4d5e6f7g8h9i0j"
  SECRET_TOKEN: "token_abc123xyz789"

---
# Secret for Docker Registry (if using private images)
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: learning
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: '{"docker.io":{"username":"myusername","password":"mypassword","email":"user@example.com"}}'

---
# Secret for TLS/SSL Certificates
apiVersion: v1
kind: Secret
metadata:
  name: tls-cert
  namespace: learning
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIICljCCAX4CCQCKz0Sm0fF9KjANBgkqhkiG9w0BAQsFADANMQswCQYDVQQGEwJV
    UzAeFw0yNDA3MTIxMjAwMDBaFw0yNTA3MTIxMjAwMDBaMA0xCzAJBgNVBAYTAlVT
    -----END CERTIFICATE-----
  tls.key: |
