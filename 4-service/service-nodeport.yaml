---
# Service NodePort - External access via node IP and port
# Opens port on every node in the cluster
# Useful for external access without load balancer

apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: learning
  labels:
    app: nginx-app
    service-type: external
spec:
  type: NodePort
  
  selector:
    app: nginx-app
  
  ports:
  - name: http
    port: 80           # Internal cluster port
    targetPort: 80     # Container port
    nodePort: 30080    # External port on each node (30000-32767)
    protocol: TCP
